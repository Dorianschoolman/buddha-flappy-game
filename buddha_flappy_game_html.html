<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Buddha Flappy Game</title>
  <style>
    body { margin:0; overflow:hidden; font-family:sans-serif; }
    canvas { background:#87CEEB; display:block; }
    #info {
      position:absolute; top:10px; left:10px; background:white; padding:10px; border-radius:10px;
    }
  </style>
</head>
<body>
<div id="info">Klik om te vliegen. Leer over Boeddha!</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let bird = { x:100, y:200, gravity:0.6, lift:-10, velocity:0 };
let pipes = [];
let frame = 0;
let score = 0;

const facts = [
  "Boeddha heette Siddhartha Gautama.",
  "Hij werd geboren in Nepal.",
  "Hij zocht verlichting door meditatie.",
  "De Vier Edele Waarheden zijn belangrijk.",
  "Het Achtvoudige Pad leidt tot verlichting."
];

function drawBird() {
  ctx.fillStyle = "gold";
  ctx.beginPath();
  ctx.arc(bird.x, bird.y, 15, 0, Math.PI*2);
  ctx.fill();
}

function drawPipes() {
  ctx.fillStyle = "green";
  pipes.forEach(p => {
    ctx.fillRect(p.x, 0, 50, p.top);
    ctx.fillRect(p.x, canvas.height - p.bottom, 50, p.bottom);
  });
}

function updatePipes() {
  if(frame % 100 === 0) {
    let top = Math.random() * canvas.height/2;
    let bottom = Math.random() * canvas.height/2;
    pipes.push({ x: canvas.width, top, bottom });
  }

  pipes.forEach(p => p.x -= 3);

  pipes = pipes.filter(p => p.x > -50);
}

function checkCollision() {
  for(let p of pipes) {
    if(bird.x > p.x && bird.x < p.x+50) {
      if(bird.y < p.top || bird.y > canvas.height - p.bottom) {
        alert("Game Over!\n" + facts[Math.floor(Math.random()*facts.length)]);
        document.location.reload();
      }
    }
  }
}

function update() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  if(bird.y > canvas.height) {
    bird.y = canvas.height;
    bird.velocity = 0;
  }

  drawBird();
  drawPipes();
  updatePipes();
  checkCollision();

  frame++;
  requestAnimationFrame(update);
}

window.addEventListener("click", () => {
  bird.velocity = bird.lift;
});

update();
</script>
</body>
</html>
